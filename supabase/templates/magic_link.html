<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OxiSure Tech Magic Link</title>
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #F8FAFC;
      color: #0F172A;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 480px;
      margin: 40px auto;
      background-color: #FFFFFF;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(15, 23, 42, 0.07);
      padding: 32px;
      text-align: center;
    }
    .title {
      font-size: 24px;
      font-weight: 700;
      color: #1B365D;
      margin-bottom: 12px;
    }
    .text {
      font-size: 16px;
      line-height: 1.6;
      color: #475569;
      margin-bottom: 24px;
    }
    .button {
      display: inline-block;
      background-color: #1B365D;
      color: #FFFFFF !important;
      font-weight: 600;
      font-size: 16px;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 8px;
      margin-bottom: 24px;
    }
    .footer {
      font-size: 12px;
      color: #94A3B8;
      margin-top: 32px;
      border-top: 1px solid #E2E8F0;
      padding-top: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="title">OxiSure Tech Tracker</h1>
    <p class="text">Hello! You requested a magic link to sign in to your OxiSure Tech Tracker dashboard.</p>
    
    <a href="{{ .ConfirmationURL }}" class="button">Open My Dashboard</a>
    
    <p class="text" style="font-size: 14px;">If you didn't request this, you can safely ignore this email.</p>
    
    <div class="footer">
      &copy; 2026 OxiSure Tech Solutions. All rights reserved.
    </div>
  </div>
</body>
</html>
